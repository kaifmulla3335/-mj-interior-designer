<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="goldBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F0D060"/>
      <stop offset="50%" style="stop-color:#D4AF37"/>
      <stop offset="100%" style="stop-color:#B8962E"/>
    </linearGradient>
  </defs>

  <!-- Gold rounded background -->
  <rect width="100" height="100" rx="22" ry="22" fill="url(#goldBg)"/>

  <!-- Subtle inner shadow/depth -->
  <rect width="100" height="100" rx="22" ry="22" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>

  <!-- MJ dark text -->
  <text
    x="50"
    y="60"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="42"
    font-weight="700"
    text-anchor="middle"
    fill="#0C0B09"
    letter-spacing="1"
  >MJ</text>

  <!-- Small dark diamond accent below -->
  <polygon points="50,73 53.5,78 50,83 46.5,78" fill="#0C0B09" opacity="0.6"/>
</svg>